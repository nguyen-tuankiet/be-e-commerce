server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: be-e-commerce

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-token-expiration: 900000        # 15 minutes in ms
  refresh-token-expiration: 604800000    # 7 days in ms
  password-reset-expiration: 3600000     # 1 hour in ms

# Application custom properties
app:
  name: BE E-Commerce
  version: 1.0.0
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200

logging:
  level:
    com.example.becommerce: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
