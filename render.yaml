services:
  - type: web
    name: glowup-be
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /api/categories
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_SECRET_KEY
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false
      - key: VNPAY_PAY_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_IP_ADDRESS
        value: 127.0.0.1
      - key: APP_FRONTEND_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
